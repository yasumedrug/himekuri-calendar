<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日めくりカレンダー 2026</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ニックネームモーダル -->
  <div id="nickname-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <p class="modal-title">ニックネームを入力してください</p>
      <input id="nickname-input" type="text" placeholder="例: かいくん" maxlength="20">
      <button id="nickname-submit">決定</button>
    </div>
  </div>

  <div class="app-wrapper">

    <!-- ヘッダー：ナビゲーション -->
    <header class="nav-bar">
      <button class="nav-btn" id="prev-btn" title="前の日 (←)">
        <span class="nav-arrow">‹</span>
      </button>
      <button class="date-display" id="date-display-btn" title="日付を選択してジャンプ">
        <span id="date-label" class="date-label"></span>
        <span class="date-calendar-icon">📅</span>
        <input type="date" id="date-picker" class="date-picker-overlay">
      </button>
      <button class="nav-btn" id="next-btn" title="次の日 (→)">
        <span class="nav-arrow">›</span>
      </button>
    </header>

    <!-- カレンダーページ（PDF.js canvas） -->
    <main class="calendar-area">
      <div class="page-container" id="page-container">
        <!-- 現在のページ -->
        <div class="page-wrapper current" id="page-current">
          <canvas id="canvas-current" class="calendar-canvas"></canvas>
        </div>
        <!-- 次ページ（アニメーション用） -->
        <div class="page-wrapper next hidden" id="page-next">
          <canvas id="canvas-next" class="calendar-canvas"></canvas>
        </div>
      </div>

      <!-- ローディング表示 -->
      <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
        <p>カレンダーを読み込んでいます...</p>
      </div>
    </main>

    <!-- コメントセクション -->
    <section class="comment-section" id="comment-section">
      <h2 class="comment-title">💬 コメント</h2>

      <div class="comment-input-area">
        <input id="comment-nickname" type="text" class="comment-nick" placeholder="ニックネーム" maxlength="20" readonly>
        <input id="comment-text" type="text" class="comment-body" placeholder="この日に一言..." maxlength="200">
        <button id="comment-submit" class="comment-btn">送信</button>
      </div>

      <div class="comment-list" id="comment-list">
        <p class="no-comment" id="no-comment">まだコメントはありません</p>
      </div>
    </section>

  </div>

  <!-- Firebase (compat SDK: CDN で簡単に使える) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="firebase.js"></script>
  <script type="module" src="app.js"></script>

</body>
</html>
